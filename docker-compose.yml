services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stocktrace-backend
    restart: unless-stopped
    environment:
      - PORT=8888
    networks:
      - stocktrace-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stocktrace-frontend
    restart: unless-stopped
    ports:
      - "3000:80"       # access at http://localhost:3000
    depends_on:
      - backend
    networks:
      - stocktrace-net

networks:
  stocktrace-net:
    driver: bridge
