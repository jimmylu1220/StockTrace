services:
  # ── Go Backend ─────────────────────────────────────
  - type: web
    name: stocktrace-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: PORT
        value: "8888"

  # ── React Frontend (Static Site) ───────────────────
  - type: web
    name: stocktrace-web
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    plan: free
    routes:
      - type: rewrite
        source: /api/*
        destination: https://stocktrace-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
